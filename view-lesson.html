<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض الدرس | المنصة التعليمية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .header {
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 20px;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* تأثير الـ Skeleton Loading */
        @keyframes skeleton-loading {
            0% { background-color: #f1f5f9; }
            50% { background-color: #e2e8f0; }
            100% { background-color: #f1f5f9; }
        }

        .loading-shimmer {
            animation: skeleton-loading 1.2s linear infinite;
            border-radius: 8px;
            color: transparent !important;
        }

        /* Spinner CSS */
        .loader-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            gap: 10px;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 { margin: 0; color: var(--primary); min-height: 40px; }
        
        .content-section {
            margin-top: 20px;
            line-height: 1.8;
            font-size: 1.1rem;
            white-space: pre-wrap;
        }

        .media-container {
            margin-top: 25px;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            display: none;
        }

        iframe, video, img {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
            display: block;
        }

        .external-link {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #eff6ff;
            border-right: 5px solid var(--primary);
            text-decoration: none;
            color: var(--primary);
            font-weight: bold;
        }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 25px;
            background: #64748b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
        }
        .print-btn {
    float: left; /* يظهر على اليسار */
    padding: 8px 15px;
    background: #f1f5f9;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: bold;
    color: #475569;
    transition: 0.3s;
}

    .print-btn:hover {
         background: #e2e8f0;
        color: var(--primary);
    }
    /* أهم جزء: إخفاء الأزرار عند الطباعة */
   @media print {
        /* إخفاء كل شيء تقريباً لتوفير الحبر */
        .print-btn, .back-btn, .loader-wrapper, .header small, 
        .content-section, .media-container, .external-link {
            display: none !important;
        }

        /* إظهار حاوية الباركود فقط والعنوان */
        #qrPrintSection { 
            display: block !important; 
            margin-top: 50px;
            border: none; /* إزالة الحدود المنقطة عند الطباعة */
        }

        h1 { 
            display: block !important; 
            text-align: center; 
            font-size: 24pt;
        }

        body { background: white; }
        .container { box-shadow: none; border: none; width: 100%; }
    }

    /* ستايل حاوية الباركود (مخفية في المتصفح وتظهر فقط في الطباعة) */
    #qrPrintSection {
        display: none;
        text-align: center;
        margin-top: 30px;
        padding: 20px;
        border: 1px dashed #ccc;
        page-break-inside: avoid;
    }
    </style>
</head>
<body>

    <div class="container">
        <div id="loadingIndicator" class="loader-wrapper">
            <div class="loader"></div>
            <div style="color: #64748b; font-weight: bold;">جاري جلب بيانات الدرس...</div>
        </div>
        

        <div class="header">
            <h1 id="lessonTitle" class="loading-shimmer">جاري تحميل العنوان...</h1>
            <div id="lessonMeta"></div>
        </div>

        <div id="lessonTextContent" class="content-section loading-shimmer">
            جاري تحميل محتوى الدرس، يرجى الانتظار قليلاً...
        </div>

        <div id="mediaContainer" class="media-container"></div>

        <a id="externalLink" href="#" target="_blank" class="external-link">
            🔗 اضغط هنا للانتقال للرابط المرفق بالدرس
        </a>

<div id="qrPrintSection">
    <p style="margin-bottom: 10px; font-weight: bold;">🔗 لمشاهدة المرفقات (فيديو/روابط/ملفات)، امسح الـ QR Code التالي:</p>
    <canvas id="qrCanvas"></canvas>
</div>


        <center>
            <a href="index.html" id="backBtn" class="back-btn">⬅️ العودة</a>
        </center>
        <button id="printBtn" onclick="window.print()" class="print-btn" style="display: none;">🖨️ طباعة الدرس</button>
    </div>

<script>
    let _supabase;

    async function initSupabase() {
        try {
            if (typeof supabase === 'undefined') {
                setTimeout(initSupabase, 500);
                return;
            }
            _supabase = supabase.createClient('https://dkvywsnztqyxcflipldw.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrdnl3c256dHF5eGNmbGlwbGR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMzg5MTksImV4cCI6MjA4OTkxNDkxOX0.0A31WY3QrAl_o376rJSZ9t9aYyWRbyjSMShq6vAOOdk');
            loadLesson();
        } catch (e) {
            console.error("خطأ في الاتصال بالسيرفر:", e);
        }
    }

    function getYoutubeEmbedUrl(url) {
        if (!url) return "";
        let videoId = '';
        if (url.includes('v=')) {
            videoId = url.split('v=')[1].split('&')[0];
        } else if (url.includes('youtu.be/')) {
            videoId = url.split('youtu.be/')[1].split('?')[0];
        } else if (url.includes('embed/')) {
            return url; 
        } else {
            return url; 
        }
        return `https://www.youtube.com/embed/${videoId}`;
    }

    async function loadLesson() {
        const urlParams = new URLSearchParams(window.location.search);
        const lessonId = urlParams.get('id');
        const role = urlParams.get('role');

        if (!lessonId) return;

        try {
            const { data: lesson, error } = await _supabase
                .from('lessons')
                .select('*')
                .eq('id', lessonId)
                .single();

            if (error) throw error;

            // إخفاء مؤشر التحميل وإزالة تأثير الـ Shimmer
            document.getElementById('loadingIndicator').style.display = 'none';
            document.getElementById('lessonTitle').classList.remove('loading-shimmer');
            document.getElementById('lessonTextContent').classList.remove('loading-shimmer');

            // عرض البيانات
            document.getElementById('lessonTitle').innerText = lesson.name;
            document.getElementById('lessonMeta').innerHTML = `<small>${lesson.class_name} | ${lesson.subject_name}</small>`;
            
            // تخصيص زر العودة بناءً على الرتبة
           // --- تعديل وجهة زر العودة الذكي ---
            const backBtn = document.getElementById('backBtn');
            const selectedClass = localStorage.getItem('selectedClass') || "السابع"; // جلب الصف اللي كان فيه الطالب

           // ابحث عن الجزء اللي فيه if (role === 'admin') وضيف عليه هاد السطر:
            if (role === 'admin') {
               backBtn.href = 'manage-lessons.html';
                backBtn.innerText = '⬅️ العودة لإدارة الدروس';
                
                // إظهار زر الطباعة للمعلم فقط
                document.getElementById('printBtn').style.display = 'block'; 
            } 
                
             else {
                // الطالب يرجع لصفحة الـ QR اللي كان فيها
                backBtn.href = 'qrcodes.html'; 
                backBtn.innerText = '⬅️ العودة لقائمة الدروس';
            }
            if (lesson.Lesson_text) {
                document.getElementById('lessonTextContent').innerText = lesson.Lesson_text;
            } else {
                document.getElementById('lessonTextContent').style.display = 'none';
            }
            // 1. التعامل مع الرابط الخارجي (Lesson.url)
            if (lesson.url) {
                const link = document.getElementById('externalLink');
                const mediaContainer = document.getElementById('mediaContainer');
                
                if (lesson.url.includes('youtube.com') || lesson.url.includes('youtu.be')) {
                    const embedUrl = getYoutubeEmbedUrl(lesson.url);
                    mediaContainer.style.display = 'block';
                    mediaContainer.innerHTML = `<iframe src="${embedUrl}" allowfullscreen></iframe>`;
                    link.style.display = 'none';
                } else {
                    link.href = lesson.url;
                    link.innerHTML = `🔗 رابط إضافي للمادة العلمية`;
                    link.style.display = 'block';
                }
            } else {
                document.getElementById('externalLink').style.display = 'none';
            }

            // 2. التعامل مع الملف المرفق (Lesson.file_url)
            if (lesson.file_url) {
                const mediaContainer = document.getElementById('mediaContainer');
                const fileUrl = lesson.file_url.toLowerCase();
                mediaContainer.style.display = 'block';

                if (fileUrl.match(/\.(jpg|jpeg|png|gif|webp)$/)) {
                    mediaContainer.innerHTML = `<img src="${lesson.file_url}" alt="درس مصور">`;
                } else if (fileUrl.includes('youtube.com') || fileUrl.includes('youtu.be') || fileUrl.match(/\.(mp4|webm)$/)) {
                    const embedUrl = getYoutubeEmbedUrl(lesson.file_url);
                    mediaContainer.innerHTML = `<iframe src="${embedUrl}" allowfullscreen></iframe>`;
                } else {
                    mediaContainer.innerHTML = `<div style="padding:20px; text-align:center; background:#f1f5f9;">📄 ملف مرفق <br><a href="${lesson.file_url}" target="_blank">اضغط للفتح</a></div>`;
                }
            }

            // 3. توليد الباركود (متاح دائماً للطباعة)
            try {
                // نأخذ رابط الصفحة الحالية للطالب فقط (بدون كلمة admin لضمان فتحه عند الطالب)
                const qrLink = window.location.origin + window.location.pathname + "?id=" + lesson.id;
                
                new QRious({
                    element: document.getElementById('qrCanvas'),
                    value: qrLink,
                    size: 200,
                    level: 'H'
                });
                
                // إظهار قسم الباركود (سيختفي برمجياً ويظهر فقط عند الطباعة عبر CSS)
                document.getElementById('qrPrintSection').style.display = 'none';
            } catch (qrError) {
                console.error("خطأ في توليد الباركود:", qrError);
            }

            // 4. تفعيل زر الطباعة (بعد التأكد من تحميل كل شيء)
            if (role === 'admin') {
                const pBtn = document.getElementById('printBtn');
                pBtn.style.display = 'block';
                // نضمن أن الزر يعمل فور النقر
                pBtn.onclick = function() { window.print(); };
            }

        } catch (e) {
            console.error(e);
            document.getElementById('loadingIndicator').style.display = 'none';
            document.getElementById('lessonTitle').innerText = "خطأ في تحميل الدرس";
        }

    }

    window.onload = initSupabase;
</script>
</body>
</html>
