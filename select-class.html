<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختيار الصف الدراسي 🏫</title>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 40px 20px; margin: 0; }
        h1 { color: #38bdf8; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; max-width: 800px; margin: 30px auto; }
        
        .class-card { 
            background: #1e293b; border: 1px solid #334155; padding: 25px 10px; 
            border-radius: 15px; cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .class-card:hover { border-color: #38bdf8; background: #243146; transform: translateY(-5px); }
        .class-card i { display: block; font-size: 2rem; margin-bottom: 10px; }

        .back-btn { 
            margin-top: 30px; display: inline-block; color: #94a3b8; 
            text-decoration: none; border: 1px solid #334155; padding: 10px 20px; border-radius: 10px; 
        }
    </style>
</head>
<body>

    <h1>مرحباً بك! 👋</h1>
    <p style="color: #94a3b8;">من فضلك اختر صفك الدراسي للوصول إلى دروسك</p>

    <div class="grid" id="classGrid">
        </div>

    <div id="navContainer"></div>

    <script>
        const classes = ["الأول", "الثاني", "الثالث", "الرابع", "الخامس", "السادس", "السابع", "الثامن", "التاسع", "العاشر"];
        const grid = document.getElementById('classGrid');

        classes.forEach(cls => {
            const div = document.createElement('div');
            div.className = 'class-card';
            div.innerHTML = `<i>🏫</i> الصف ${cls}`;
            div.onclick = () => {
                // حفظ الصف المختار في التخزين المؤقت والانتقال
                localStorage.setItem('selectedClass', cls);
                window.location.href = 'qrcodes.html';
            };
            grid.appendChild(div);
        });

        // منطق العودة الذكي (معلم/طالب)
        const role = sessionStorage.getItem('userRole');
        const nav = document.getElementById('navContainer');
        if (role === 'teacher') {
            nav.innerHTML = `<a href="student-access-v99-k2p8z5.html?mode=teacher" class="back-btn">⬅ عودة للوحة التحكم</a>`;
        } else {
            nav.innerHTML = `<a href="student-access-v99-k2p8z5.html" class="back-btn">⬅ عودة للرئيسية</a>`;
        }
    </script>
</body>
</html>
