<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختر صفك الدراسي 🏫</title>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; margin: 0; }
        
        .section-title { color: var(--primary); margin: 30px 0 15px 0; font-size: 1.2rem; border-bottom: 1px solid #334155; display: inline-block; padding-bottom: 5px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; max-width: 900px; margin: 0 auto; }
        
        .class-card { 
            background: var(--card); border: 1px solid #334155; padding: 20px 10px; 
            border-radius: 15px; cursor: pointer; transition: 0.3s; font-weight: bold; font-size: 0.9rem;
        }
        .class-card:hover { border-color: var(--primary); transform: translateY(-5px); background: #243146; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .class-card i { display: block; font-size: 1.8rem; margin-bottom: 8px; }

        .back-btn { margin-top: 40px; display: inline-block; color: #94a3b8; text-decoration: none; border: 1px solid #334155; padding: 10px 25px; border-radius: 10px; transition: 0.3s; }
        .back-btn:hover { color: white; border-color: white; }
    </style>
</head>
<body>

    <h1 style="margin-top: 20px;">مرحباً بك في المنصة التعليمية 👋</h1>
    <p style="color: #94a3b8;">اختر المرحلة الدراسية لعرض الباركودات الخاصة بك</p>

    <div class="section-title">👶 مرحلة الروضة</div>
    <div class="grid" id="kgGrid"></div>

    <div class="section-title">🎒 المرحلة الأساسية</div>
    <div class="grid" id="basicGrid"></div>

    <div class="section-title">🎓 المرحلة الثانوية</div>
    <div class="grid" id="highSchoolGrid"></div>

    <div id="navContainer"></div>

    <script>
        // تعريف الصفوف لكل مرحلة
        const kgClasses = ["الروضة"];
        const basicClasses = ["الأول", "الثاني", "الثالث", "الرابع", "الخامس", "السادس", "السابع", "الثامن", "التاسع", "العاشر"];
        const highClasses = ["أول ثانوي علمي", "أول ثانوي أدبي", "توجيهي علمي", "توجيهي أدبي"];

        function createCards(list, containerId, icon) {
            const container = document.getElementById(containerId);
            list.forEach(cls => {
                const div = document.createElement('div');
                div.className = 'class-card';
                div.innerHTML = `<i>${icon}</i> ${cls}`;
                div.onclick = () => {
                    localStorage.setItem('selectedClass', cls);
                    window.location.href = 'qrcodes.html';
                };
                container.appendChild(div);
            });
        }

        // بناء الشبكات
        createCards(kgClasses, 'kgGrid', '🧸');
        createCards(basicClasses, 'basicGrid', '🏫');
        createCards(highClasses, 'highSchoolGrid', '📚');

        // زر العودة الذكي (حسب الـ Role)
        const role = sessionStorage.getItem('userRole');
        const nav = document.getElementById('navContainer');
        if (role === 'teacher') {
            nav.innerHTML = `<a href="lessons-hub.html" class="back-btn">⬅ العودة للوحة التحكم</a>`;
        } else {
            nav.innerHTML = `<a href="student-access-v99-k2p8z5.html" class="back-btn">⬅ العودة للرئيسية</a>`;
        }
    </script>
</body>
</html>
