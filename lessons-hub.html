<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز الإدارة | خيارات التحكم</title>
    <style>
        :root {
            --primary: #0284c7;
            --bg: #ffffff;
            --card-bg: #f8fafc;
            --text-dark: #1e293b;
            --border: #e2e8f0;
        }

        body { 
            background: var(--bg); 
            color: var(--text-dark); 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }

        /* تعديل زر العودة ليكون دائماً على اليسار وفوق المحتوى */
        .back-nav { 
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: flex-start; /* يضمن بقاء الزر على اليسار */
            margin-bottom: 20px;
        }

        @media (min-width: 768px) {
            .back-nav { 
                position: absolute; 
                top: 25px; 
                left: 25px; 
                width: auto;
                margin-bottom: 0;
            }
        }

        .back-link { 
            padding: 10px 18px; 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            color: #64748b; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: bold;
            font-size: 0.85rem;
            transition: 0.3s;
        }
        .back-link:hover { background: white; color: var(--primary); border-color: var(--primary); }

        h1 { 
            color: var(--text-dark); 
            font-size: 2.2rem; 
            font-weight: 800; 
            margin-bottom: 40px; 
            padding: 0 15px; 
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; margin-top: 10px; margin-bottom: 25px; }
            .hub-card { width: 90% !important; padding: 35px 20px !important; }
        }

        .hub-container { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            flex-wrap: wrap; 
            width: 100%;
        }

        .hub-card { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            padding: 50px 30px; 
            width: 250px; 
            border-radius: 30px; 
            text-decoration: none; 
            color: var(--text-dark); 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        .hub-card:hover { 
            border-color: var(--primary); 
            transform: translateY(-10px); 
            background: white; 
            box-shadow: 0 20px 40px rgba(2, 132, 199, 0.1); 
        }

        .icon { font-size: 4rem; margin-bottom: 20px; color: var(--primary); }
        .title { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 12px; }
        .desc { font-size: 0.9rem; color: #64748b; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="back-nav">
        <a href="teacher-portal-77x-s5r30nh134.html" class="back-link">⬅ العودة</a>
    </div>

    <h1>بوابة الإدارة المركزية 🛠️</h1>

    <div class="hub-container">
        <a href="admin.html" class="hub-card">
            <span class="icon">✨</span>
            <span class="title">إضافة محتوى</span>
            <span class="desc">رفع ملفات، صور، روابط خارجية، أو نصوص تعليمية في مكان واحد.</span>
        </a>

        <a href="manage-lessons.html" class="hub-card">
            <span class="icon">⚙️</span>
            <span class="title">إدارة الدروس</span>
            <span class="desc">تعديل البيانات الحالية، حذف الدروس القديمة، أو تحديث المحتوى.</span>
        </a>
    </div>

</body>
</html>
