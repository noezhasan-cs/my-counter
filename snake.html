<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة الحية الذكية 🐍</title>
    <style>
        body { background: #0f172a; color: white; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; justify-content: center; height: 100vh; overflow: hidden; }
        h1 { color: #38bdf8; font-size: 1.8rem; margin-bottom: 10px; }
        
        #gameCanvas { 
            background: #1e293b; 
            border: 4px solid #334155; 
            border-radius: 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            display: block;
            margin: 0 auto;
        }

        /* حاوية الأزرار للعودة وإعادة البدء */
        .controls-row { display: flex; gap: 20px; justify-content: center; margin-top: 25px; }
        
        button.control-btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .restart { background: #10b981; color: white; }
        .back { background: #64748b; color: white; text-decoration: none; display: inline-block; padding: 10px 20px; border-radius: 8px; }

        button:hover, .back:hover { transform: scale(1.05); opacity: 0.9; }
    </style>
</head>
<body>

    <h1>لعبة الحية الكلاسيكية 🐍</h1>
    <p style="color: #94a3b8; margin-top:0;">استخدم أسهم الكيبورد للتحرك</p>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    <div class="controls-row">
        <button class="control-btn restart" onclick="resetGame()">إعادة بدء</button>
        <div id="backNav"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20; // حجم المربع الواحد
        let score = 0;
        let snake, food, dx, dy, gameInterval;

        function resetGame() {
            snake = [{x: 200, y: 200}];
            food = getRandomFoodPosition();
            dx = gridSize; // الحركة الأولية لليمين
            dy = 0;
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, 100);
        }

        function gameLoop() {
            update();
            draw();
        }

        function update() {
            // تحريك الرأس
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head); // إضافة الرأس الجديد في البداية

            // هل أكلت الأكل؟
            if (head.x === food.x && head.y === food.y) {
                score++;
                food = getRandomFoodPosition();
            } else {
                snake.pop(); // إزالة الذيل القديم (للمحافظة على الطول)
            }

            // هل اصطدمت بالجدار أو بنفسها؟
            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height || checkCollision()) {
                clearInterval(gameInterval);
                alert('انتهت اللعبة! مجموع نقاطك: ' + score);
                resetGame();
            }
        }

        function draw() {
            // رسم الخلفية
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // رسم الأكل (تفاحة)
            ctx.fillStyle = '#f87171';
            ctx.beginPath();
            ctx.arc(food.x + gridSize/2, food.y + gridSize/2, gridSize/2 - 2, 0, 2 * Math.PI);
            ctx.fill();

            // رسم الحية
            snake.forEach((part, index) => {
                ctx.fillStyle = (index === 0) ? '#38bdf8' : '#10b981'; // الرأس أزرق، الجسم أخضر
                ctx.fillRect(part.x, part.y, gridSize - 2, gridSize - 2); // ترك فراغ بسيط بين المربعات
            });
        }

        function checkCollision() {
            const head = snake[0];
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) return true;
            }
            return false;
        }

        function getRandomFoodPosition() {
            return {
                x: Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize,
                y: Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize
            };
        }

        // التعامل مع الكيبورد
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp' && dy === 0) { dx = 0; dy = -gridSize; }
            if (e.key === 'ArrowDown' && dy === 0) { dx = 0; dy = gridSize; }
            if (e.key === 'ArrowLeft' && dx === 0) { dx = -gridSize; dy = 0; }
            if (e.key === 'ArrowRight' && dx === 0) { dx = gridSize; dy = 0; }
        });

        // --- التعديل الذكي لزر العودة ---
        const backNav = document.getElementById('backNav');
        const role = sessionStorage.getItem('userRole');

        if (role === 'teacher') {
            backNav.innerHTML = `<a href="teacher-portal-77x-s5r30nh134.html" class="back">⬅ العودة للوحة الإدارة</a>`;
        } else {
            backNav.innerHTML = `<a href="student-access-v99-k2p8z5.html" class="back">⬅ العودة لصفحة الطلاب</a>`;
        }

        // بدء اللعبة
        resetGame();
    </script>
</body>
</html>
