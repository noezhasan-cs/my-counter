<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الإدارة - Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f172a; color: white; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .box { background: #1e293b; padding: 30px; border-radius: 20px; display: inline-block; width: 320px; border: 1px solid #334155; }
        input { width: 94%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; }
        button { width: 100%; padding: 12px; background: #38bdf8; border: none; border-radius: 8px; color: #0f172a; font-weight: bold; cursor: pointer; }
        #status { margin-top: 15px; color: #94a3b8; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="box">
        <h3>إضافة درس جديد 🚀</h3>
        <input type="text" id="nameInput" placeholder="عنوان الدرس...">
        <input type="text" id="urlInput" placeholder="رابط اليوتيوب أو الملف...">
        <button id="sendBtn" onclick="saveToSupabase()">إرسال للسحاب ✅</button>
        <div id="status">جاهز...</div>
        <a href="index.html" style="display:block; margin-top:15px; color:#64748b; text-decoration:none; font-size:0.8rem;">العودة للرئيسية</a>
    </div>

    <script>
        const SUPABASE_URL = 'https://fxefxyobcrbkfdtemej.supabase.co';
        const SUPABASE_KEY = 'ضغ_هنا_مفتاح_الـ_anon_الخاص_بك';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function saveToSupabase() {
            const url = document.getElementById('urlInput').value.trim();
            const name = document.getElementById('nameInput').value.trim();
            const status = document.getElementById('status');

            if (!url || !name) { alert("عبي البيانات يا حسن!"); return; }
            status.innerText = "جاري الإرسال...";

            const { error } = await _supabase
                .from('lessons')
                .insert([{ name: name, url: url }]);

            if (error) {
                status.innerText = "❌ فشل: " + error.message;
            } else {
                status.innerText = "✅ تم الحفظ بنجاح!";
                document.getElementById('urlInput').value = "";
                document.getElementById('nameInput').value = "";
            }
        }
    </script>
</body>
</html>
