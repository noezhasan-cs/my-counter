<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - إضافة باركود</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; text-align: center; padding: 50px; }
        .admin-card { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; display: inline-block; }
        input { padding: 12px; width: 250px; border-radius: 8px; border: none; margin-bottom: 10px; }
        button { padding: 12px 25px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .back { display: block; margin-top: 20px; color: #bdc3c7; text-decoration: none; }
    </style>
</head>
<body>
    <h1>إضافة رابط جديد 🔗</h1>
    <div class="admin-card">
        <input type="text" id="urlInput" placeholder="ضع الرابط هنا (http://...)">
        <input type="text" id="nameInput" placeholder="اسم الرابط (مثلاً: درسي الأول)">
        <br>
        <button onclick="saveLink()">إضافة للمكتبة +</button>
    </div>
    <a href="index.html" class="back">⬅ العودة للرئيسية</a>

    <script>
        function saveLink() {
            const url = document.getElementById('urlInput').value;
            const name = document.getElementById('nameInput').value;

            if (url && name) {
                // جلب القائمة القديمة أو إنشاء واحدة جديدة
                let links = JSON.parse(localStorage.getItem('myLinks')) || [];
                // إضافة الرابط الجديد
                links.push({ url: url, name: name });
                // حفظ القائمة في الذاكرة
                localStorage.setItem('myLinks', JSON.stringify(links));
                
                alert('تمت الإضافة بنجاح! اذهب لصفحة الباركودات لمشاهدته.');
                document.getElementById('urlInput').value = '';
                document.getElementById('nameInput').value = '';
            } else {
                alert('الرجاء تعبئة الحقول!');
            }
        }
    </script>
</body>
</html>
