<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الإدارة - سوبابيس</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f172a; color: white; text-align: center; font-family: 'Segoe UI', Tahoma, sans-serif; padding-top: 50px; }
        .box { background: #1e293b; padding: 30px; border-radius: 20px; display: inline-block; width: 320px; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h3 { color: #38bdf8; margin-bottom: 20px; }
        input { width: 94%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: #38bdf8; }
        button { width: 100%; padding: 12px; background: #38bdf8; border: none; border-radius: 8px; color: #0f172a; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #7dd3fc; }
        button:disabled { background: #64748b; cursor: not-allowed; }
        #status { margin-top: 15px; color: #94a3b8; font-size: 0.9rem; }
        .back-link { display:block; margin-top:20px; color:#64748b; text-decoration:none; font-size:0.8rem; }
    </style>
</head>
<body>
    <div class="box">
        <h3>إضافة درس جديد 🚀</h3>
        <input type="text" id="nameInput" placeholder="عنوان الدرس...">
        <input type="text" id="urlInput" placeholder="رابط الدرس...">
        <button id="sendBtn" onclick="saveData()">إرسال للسحاب ✅</button>
        <div id="status">جاهز للإرسال...</div>
        <a href="index.html" class="back-link">⬅ العودة للرئيسية</a>
    </div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const S_URL = 'https://dkvywsnztqyxcflipldw.supabase.co'.trim();
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrdnl3c256dHF5eGNmbGlwbGR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMzg5MTksImV4cCI6MjA4OTkxNDkxOX0.0A31WY3QrAl_o376rJSZ9t9aYyWRbyjSMShq6vAOOdk'.trim();
    const _supabase = supabase.createClient(S_URL, S_KEY);

    async function saveData() {
        const url = document.getElementById('urlInput').value.trim();
        const name = document.getElementById('nameInput').value.trim();
        const _supabase = supabase.createClient(S_URL, S_KEY, {
  auth: { persistSession: false }
});
        
        if(!url || !name) { alert("عبي الخانات!"); return; }
        
        btn.disabled = true;
        document.getElementById('status').innerText = "جاري الحفظ في سويسرا... 🚀";

        const { error } = await _supabase.from('lessons').insert([{ name, url }]);

        btn.disabled = false;
        if (error) {
            alert("فشل: " + error.message);
        } else {
            alert("✅ تم الحفظ بنجاح!");
            document.getElementById('urlInput').value = "";
            document.getElementById('nameInput').value = "";
        }
    }
</script>
</body>
</html>
