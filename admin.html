<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إضافة محتوى تعليمي شامل ➕</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; padding: 20px; direction: rtl; }
        .container { max-width: 650px; margin: 20px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: var(--primary); }
        
        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #475569; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; margin-bottom: 10px; }

        /* أزرار اختيار نوع الإضافة */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .opt-btn { background: #f1f5f9; padding: 10px; text-align: center; border-radius: 10px; cursor: pointer; font-size: 0.85rem; font-weight: bold; border: 2px solid transparent; }
        .opt-btn.active { background: #eff6ff; border-color: var(--primary); color: var(--primary); }

        .hidden { display: none; }
        .btn-save { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 20px; }
        #status { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>إضافة محتوى جديد 📝</h2>

    <label>عنوان الدرس:</label>
    <input type="text" id="title" placeholder="عنوان الدرس...">

    <div style="display: flex; gap: 10px;">
        <div style="flex:1">
            <label>الصف:</label>
            <select id="class">
                <option value="السابع">السابع</option><option value="الثامن">الثامن</option>
                <option value="التاسع">التاسع</option><option value="العاشر">العاشر</option>
            </select>
        </div>
        <div style="flex:1">
            <label>المادة:</label>
            <select id="subject">
                <option value="الرياضيات">الرياضيات</option><option value="الفيزياء">الفيزياء</option>
                <option value="اللغة العربية">اللغة العربية</option><option value="الإنجليزية">الإنجليزية</option>
            </select>
        </div>
    </div>

    <label>طريقة الإضافة:</label>
    <div class="options-grid">
        <div id="opt-url" class="opt-btn active" onclick="switchMethod('url')">رابط خارجي (يوتيوب)</div>
        <div id="opt-text" class="opt-btn" onclick="switchMethod('text')">نص / سؤال مباشر</div>
        <div id="opt-file" class="opt-btn" onclick="switchMethod('file')">رفع من المعرض</div>
    </div>

    <div id="sec-url">
        <label>ضع الرابط (URL):</label>
        <input type="url" id="external-url" placeholder="https://example.com">
    </div>

    <div id="sec-text" class="hidden">
        <label>اكتب المحتوى النصي:</label>
        <textarea id="lesson-text" rows="5" placeholder="اكتب الشرح هنا..."></textarea>
    </div>

    <div id="sec-file" class="hidden">
        <label>اختر صورة أو فيديو:</label>
        <input type="file" id="file-input" accept="image/*,video/*">
    </div>

    <button class="btn-save" onclick="handleSave()">حفظ المحتوى ✅</button>
    <div id="status"></div>
</div>

<script>
    const S_URL = 'https://dkvywsnztqyxcflipldw.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrdnl3c256dHF5eGNmbGlwbGR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMzg5MTksImV4cCI6MjA4OTkxNDkxOX0.0A31WY3QrAl_o376rJSZ9t9aYyWRbyjSMShq6vAOOdk';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    let selectedMethod = 'url';

    function switchMethod(m) {
        selectedMethod = m;
        // تحديث شكل الأزرار
        document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('opt-' + m).classList.add('active');
        // إظهار القسم المناسب
        document.getElementById('sec-url').classList.add('hidden');
        document.getElementById('sec-text').classList.add('hidden');
        document.getElementById('sec-file').classList.add('hidden');
        document.getElementById('sec-' + m).classList.remove('hidden');
    }

    async function handleSave() {
        const title = document.getElementById('title').value;
        const status = document.getElementById('status');
        if(!title) { alert("العنوان مطلوب"); return; }

        status.innerText = "جاري الحفظ... ⏳";
        let dataToSave = {
            name: title,
            class_name: document.getElementById('class').value,
            subject_name: document.getElementById('subject').value,
            content_type: selectedMethod
        };

        try {
            if (selectedMethod === 'url') {
                dataToSave.url = document.getElementById('external-url').value;
            } 
            else if (selectedMethod === 'text') {
                dataToSave.lesson_text = document.getElementById('lesson-text').value;
            } 
            else if (selectedMethod === 'file') {
                const file = document.getElementById('file-input').files[0];
                if (!file) throw new Error("اختر ملفاً");
                
                const fileName = `${Date.now()}_${file.name}`;
                const { data: upData, error: upErr } = await _supabase.storage
                    .from('NewBucket') // استخدام اسم الستورج الخاص بك
                    .upload(fileName, file);
                
                if (upErr) throw upErr;
                const { data: urlData } = _supabase.storage.from('NewBucket').getPublicUrl(fileName);
                dataToSave.file_url = urlData.publicUrl;
            }

            const { error: dbErr } = await _supabase.from('lessons').insert([dataToSave]);
            if (dbErr) throw dbErr;

            status.style.color = "green";
            status.innerText = "تمت الإضافة بنجاح! 🎉";
        } catch (e) {
            status.style.color = "red";
            status.innerText = "خطأ: " + e.message;
        }
    }
</script>
</body>
</html>
