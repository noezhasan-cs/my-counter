<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة المعلم - إضافة دروس</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; text-align: center; padding: 50px; }
        .admin-card { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; display: inline-block; width: 300px; }
        input { padding: 12px; width: 90%; border-radius: 8px; border: none; margin-bottom: 15px; }
        button { padding: 12px 25px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .back { display: block; margin-top: 20px; color: #bdc3c7; text-decoration: none; }
    </style>
</head>
<body>
    <h1>إضافة درس جديد للطلاب 🚀</h1>
    <div class="admin-card">
        <input type="text" id="urlInput" placeholder="رابط الدرس (http://...)">
        <input type="text" id="nameInput" placeholder="عنوان الدرس">
        <button onclick="saveToCloud()">إرسال للسحاب ✅</button>
    </div>
    <a href="index.html" class="back">⬅ العودة للرئيسية</a>

    <script>
        // إعدادات الربط الخاصة بمشروعك
        const firebaseConfig = {
            databaseURL: "https://myschoolproject-fdf5c-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function saveToCloud() {
            const url = document.getElementById('urlInput').value;
            const name = document.getElementById('nameInput').value;

            if (url && name) {
                db.ref('lessons').push({
                    url: url,
                    name: name
                }).then(() => {
                    alert("تم الحفظ! سيظهر عند الطلاب فوراً.");
                    document.getElementById('urlInput').value = "";
                    document.getElementById('nameInput').value = "";
                }).catch(err => alert("خطأ في الاتصال: " + err));
            } else {
                alert("يرجى ملء الحقول");
            }
        }
    </script>
</body>
</html>
