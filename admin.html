<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة المعلم - إرسال سحابي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; text-align: center; padding: 50px; }
        .admin-box { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; display: inline-block; width: 320px; border: 1px solid rgba(255,255,255,0.2); }
        input { padding: 12px; width: 90%; border-radius: 8px; border: none; margin-bottom: 15px; font-size: 1rem; }
        button { padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1.1rem; }
        button:active { transform: scale(0.98); }
        .back { display: block; margin-top: 25px; color: #bdc3c7; text-decoration: none; }
    </style>
</head>
<body>
    <h1>إضافة درس جديد ☁️</h1>
    <div class="admin-box">
        <input type="text" id="urlInput" placeholder="رابط الدرس (http://...)">
        <input type="text" id="nameInput" placeholder="عنوان الدرس">
        <button onclick="saveToCloud()">إرسال للسحاب الآن ✅</button>
    </div>
    <a href="index.html" class="back">⬅ العودة للرئيسية</a>

    <script>
        // إعدادات الربط (تأكد من هذا الرابط بدقة)
        const firebaseConfig = {
            databaseURL: "https://myschoolproject-fdf5c-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function saveToCloud() {
            const url = document.getElementById('urlInput').value;
            const name = document.getElementById('nameInput').value;

            if (url !== "" && name !== "") {
                // إرسال البيانات لمجلد اسمه lessons
                db.ref('lessons').push({
                    url: url,
                    name: name
                })
                .then(() => {
                    alert("ممتاز! تم الحفظ في السحاب.");
                    document.getElementById('urlInput').value = "";
                    document.getElementById('nameInput').value = "";
                })
                .catch((error) => {
                    alert("خطأ: " + error.message);
                });
            } else {
                alert("يا حسن، عبي الفراغات أولاً!");
            }
        }
    </script>
</body>
</html>
