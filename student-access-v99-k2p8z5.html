<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الطلاب التعليمية 🎓</title>
    <style>
        body { background: #0f172a; color: white; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; justify-content: center; height: 100vh; overflow: hidden; }
        h1 { color: #38bdf8; font-size: 2.5rem; margin-bottom: 5px; }
        .subtitle { color: #94a3b8; margin-bottom: 40px; font-size: 1.1rem; }
        
        /* أيقونة الألعاب (نفس تصميم صفحة المعلم للاتساق) */
        .game-trigger { position: absolute; top: 20px; left: 20px; font-size: 1.5rem; cursor: pointer; background: #1e293b; padding: 10px; border-radius: 50%; border: 1px solid #334155; transition: 0.3s; z-index: 10; }
        .game-trigger:hover { transform: rotate(15deg) scale(1.1); border-color: #38bdf8; }

        /* لوحة الألعاب المنبثقة */
        #gamePanel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e293b; padding: 30px; border-radius: 25px; border: 2px solid #38bdf8; box-shadow: 0 0 50px rgba(0,0,0,0.8); z-index: 100; width: 280px; }
        .close-btn { position: absolute; top: 10px; right: 15px; cursor: pointer; color: #f87171; font-size: 1.2rem; }
        .game-btn { display: block; width: 100%; padding: 12px; margin: 10px 0; background: #0f172a; color: #38bdf8; border: 1px solid #334155; border-radius: 10px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .game-btn:hover { background: #38bdf8; color: #0f172a; }

        /* حاوية الأزرار الرئيسية */
        .container { display: flex; justify-content: center; padding: 20px; }
        .nav-card { 
            background: #1e293b; 
            border: 2px solid #334155; 
            border-radius: 25px; 
            padding: 40px 30px; 
            width: 280px; 
            text-decoration: none; 
            color: white; 
            transition: 0.4s all cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        
        .nav-card:hover { 
            border-color: #38bdf8; 
            transform: scale(1.05); 
            box-shadow: 0 20px 45px rgba(56, 189, 248, 0.15); 
        }

        .icon { font-size: 4rem; display: block; margin-bottom: 20px; }
        .title { color: #38bdf8; font-weight: bold; font-size: 1.5rem; display: block; }
        .desc { font-size: 0.95rem; color: #94a3b8; display: block; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="game-trigger" onclick="toggleGames()" title="استراحة المحارب 🎮">🎮</div>

    <div id="gamePanel">
        <span class="close-btn" onclick="toggleGames()">✖</span>
        <h3 style="color: #38bdf8; margin-top: 0;">ألعاب الاستراحة 🕹️</h3>
        <a href="counter.html" class="game-btn">🔢 لعبة العداد</a>
        <div class="game-btn" style="opacity: 0.4; cursor: not-allowed;">🐍 لعبة الحية (قريباً)</div>
    </div>

    <h1>أهلاً بك يا بطل! 🎓</h1>
    <p class="subtitle">جاهز لدرس اليوم؟ اختر ما تريد القيام به:</p>

    <div class="container">
        <a href="qrcodes.html" class="nav-card">
            <span class="icon">🔍</span>
            <span class="title">عرض دروسي</span>
            <span class="desc">امسح الباركود وافتح الدرس فوراً</span>
        </a>
    </div>

    <script>
        function toggleGames() {
            const panel = document.getElementById('gamePanel');
            panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
        }
    </script>
</body>
</html>
