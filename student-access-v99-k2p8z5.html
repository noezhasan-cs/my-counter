<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الطالبات 🎓</title>
    <style>
        /* الألوان الجديدة: خلفية بيضاء مع أزرق سماوي ناعم */
        :root {
            --primary: #c70285; 
            --bg: #ffffff;
            --card-bg: #f8fafc;
            --text-dark: #c70285;
            --border: #e2e8f0;
        }

        body { 
            background: var(--bg); 
            color: var(--text-dark); 
            text-align: center; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            /* التعديل هنا: جعل الارتفاع مرناً ليتناسب مع الموبايل */
            min-height: 100vh; 
            padding: 20px 0;
            box-sizing: border-box;
        }

        /* زر عودة المعلمة */
        #teacherBackBtn { 
            display: none; 
            margin-bottom: 20px; /* ليعطي مساحة في الموبايل */
        }
        
        /* في الشاشات الكبيرة يرجع لمكانه القديم (اليسار) */
        @media (min-width: 768px) {
            #teacherBackBtn {
                position: absolute; 
                top: 25px; 
                left: 25px;
                margin-bottom: 0;
            }
        }

        .admin-link { 
            padding: 12px 20px; 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            color: var(--primary); 
            border-radius: 12px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 0.9rem;
            transition: 0.3s;
            display: inline-block;
        }
        .admin-link:hover { background: var(--primary); color: white; }

        /* تعديل أحجام الخطوط للموبايل */
        h1 { color: var(--text-dark); font-size: 2.8rem; margin: 10px 0; font-weight: 800; }
        .subtitle { color: #253346; margin-bottom: 30px; font-size: 1.2rem; padding: 0 10px; }
        
        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .subtitle { font-size: 1rem; }
            .nav-card { width: 80% !important; padding: 30px 20px !important; }
        }

        .container { display: flex; justify-content: center; padding: 10px; width: 100%; }

        .nav-card { 
            background: var(--card-bg); 
            border: 2px solid var(--border); 
            border-radius: 30px; 
            padding: 50px 40px; 
            width: 280px; 
            text-decoration: none; 
            color: var(--text-dark); 
            transition: 0.3s; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }
        .nav-card:hover { 
            border-color: var(--primary); 
            transform: scale(1.05); 
            background: white;
            box-shadow: 0 20px 40px rgba(2, 132, 199, 0.1);
        }

        .icon { font-size: 4.5rem; display: block; margin-bottom: 20px; color: var(--primary); }
        .title { color: var(--primary); font-weight: bold; font-size: 1.6rem; }
    </style>
</head>
<body>

    <div id="teacherBackBtn">
        <a href="teacher-portal-77x-s5r30nh134.html" class="admin-link">🏠 العودة للوحة الإدارة</a>
    </div>

    <h1>أهلاً بكِ يا مبدعة! ✨</h1>
    <p class="subtitle">استعرضي دروسك التفاعلية</p>

    <div class="container">
        <a href="select-class.html" class="nav-card">
            <span class="icon">🔍</span>
            <span class="title">عرض دروسي</span>
        </a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get('mode') === 'teacher') {
            sessionStorage.setItem('userRole', 'teacher');
        }

        if (sessionStorage.getItem('userRole') === 'teacher') {
            document.getElementById('teacherBackBtn').style.display = 'block';
        }
    </script>
</body>
</html>
