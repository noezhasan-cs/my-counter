<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الطالبات 🎓</title>
    <style>
        /* الألوان الجديدة: خلفية بيضاء مع أزرق سماوي ناعم */
        :root {
            --primary: #c70285; 
            --bg: #ffffff;
            --card-bg: #f8fafc;
            --text-dark: #c70285;
            --border: #e2e8f0;
        }

        body { 
            background: var(--bg); 
            color: var(--text-dark); 
            text-align: center; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* زر عودة المعلمة في جهة اليسار */
        #teacherBackBtn { 
            display: none; 
            position: absolute; 
            top: 25px; 
            left: 25px; 
        }
        .admin-link { 
            padding: 12px 20px; 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            color: var(--primary); 
            border-radius: 12px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .admin-link:hover { background: var(--primary); color: white; }

        h1 { color: var(--text-dark); font-size: 2.8rem; margin-bottom: 10px; font-weight: 800; }
        .subtitle { color: #253346; margin-bottom: 40px; font-size: 1.2rem; }
        
        .container { display: flex; justify-content: center; padding: 20px; }

        /* الكرت الذي أعجبك بتعديل الألوان */
        .nav-card { 
            background: var(--card-bg); 
            border: 2px solid var(--border); 
            border-radius: 30px; 
            padding: 50px 40px; 
            width: 280px; 
            text-decoration: none; 
            color: var(--text-dark); 
            transition: 0.3s; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }
        .nav-card:hover { 
            border-color: var(--primary); 
            transform: scale(1.05); 
            background: white;
            box-shadow: 0 20px 40px rgba(2, 132, 199, 0.1);
        }

        /* استخدام أيقونات رمزية بدلاً من الشخصيات */
        .icon { font-size: 4.5rem; display: block; margin-bottom: 20px; color: var(--primary); }
        .title { color: var(--primary); font-weight: bold; font-size: 1.6rem; }
    </style>
</head>
<body>

    <div id="teacherBackBtn">
        <a href="teacher-portal-77x-s5r30nh134.html" class="admin-link">🏠 العودة للوحة الإدارة</a>
    </div>

    <h1>أهلاً بكِ يا مبدعة! ✨</h1>
    <p class="subtitle">استعرضي دروسك التفاعلية</p>

    <div class="container">
        <a href="select-class.html" class="nav-card">
            <span class="icon">🔍</span>
            <span class="title">عرض دروسي</span>
        </a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get('mode') === 'teacher') {
            sessionStorage.setItem('userRole', 'teacher');
        }

        if (sessionStorage.getItem('userRole') === 'teacher') {
            document.getElementById('teacherBackBtn').style.display = 'block';
        }
    </script>
</body>
</html>
