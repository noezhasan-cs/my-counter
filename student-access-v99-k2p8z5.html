<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الطلاب 🎓</title>
    <style>
        body { background: #0f172a; color: white; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; justify-content: center; height: 100vh; overflow: hidden; }
        h1 { color: #38bdf8; font-size: 2.5rem; margin-bottom: 10px; }
        .subtitle { color: #94a3b8; margin-bottom: 40px; }
        
        .container { display: flex; justify-content: center; padding: 20px; }
        .nav-card { background: #1e293b; border: 2px solid #334155; border-radius: 25px; padding: 50px 40px; width: 280px; text-decoration: none; color: white; transition: 0.3s; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .nav-card:hover { border-color: #38bdf8; transform: scale(1.05); }
        .icon { font-size: 4.5rem; display: block; margin-bottom: 20px; }
        .title { color: #38bdf8; font-weight: bold; font-size: 1.6rem; }

        /* زر عودة المعلم */
        #teacherBackBtn { display: none; position: absolute; top: 20px; right: 20px; }
        .admin-link { padding: 10px 20px; background: #1e293b; border: 1px solid #38bdf8; color: #38bdf8; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="teacherBackBtn">
        <a href="teacher-portal-77x-s5r30nh134.html" class="admin-link">🏠 العودة للوحة المعلم</a>
    </div>

    <h1>أهلاً بك يا بطل! 🎓</h1>
    <p class="subtitle">اختر الخيار أدناه لاستعراض دروسك</p>

    <div class="container">
        <a href="qrcodes.html" class="nav-card">
            <span class="icon">🔍</span>
            <span class="title">عرض دروسي</span>
        </a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get('mode') === 'teacher') {
            sessionStorage.setItem('userRole', 'teacher');
        }

        if (sessionStorage.getItem('userRole') === 'teacher') {
            document.getElementById('teacherBackBtn').style.display = 'block';
        }
    </script>
</body>
</html>
