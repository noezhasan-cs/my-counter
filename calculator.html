<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الآلة الحاسبة الذكية</title>
    <style>
        :root { --primary: #0284c7; --bg: #ffffff; --text: #0f172a; }
        body { background: var(--bg); font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .calc-container { background: #f8fafc; padding: 25px; border-radius: 20px; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 300px; }
        #display { width: 100%; height: 60px; font-size: 1.5rem; text-align: left; border: none; background: white; border-radius: 12px; padding: 10px; box-sizing: border-box; margin-bottom: 20px; color: var(--primary); font-weight: bold; border: 1px solid #e2e8f0; }
        
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { padding: 15px; font-size: 1.2rem; border: 1px solid #e2e8f0; border-radius: 10px; cursor: pointer; transition: 0.2s; background: white; font-weight: bold; }
        button:hover { background: #f1f5f9; transform: scale(1.05); }
        .op { color: var(--primary); background: #eff6ff; }
        .equal { background: var(--primary); color: white; grid-column: span 2; }
        .equal:hover { background: #0369a1; }
        .clear { color: #ef4444; }
        .back-link { display: block; text-align: center; margin-top: 15px; text-decoration: none; color: #64748b; font-size: 0.8rem; }
        
        /* نوت: تصميم نافذة "المنطقة المحظورة" المرعبة */
#blockingModal {
    display: none; 
    position: fixed; 
    top: 0; left: 0; 
    width: 100%; height: 100%; 
    background: rgba(0, 0, 0, 0.85); /* خلفية سوداء شفافة */
    z-index: 99999; /* رقم عالي جداً ليكون فوق الغباش */
    justify-content: center; 
    align-items: center;
    pointer-events: all; /* نوت: نضمن أن الكبس شغال هنا */
}

/* تأكد أن الـ body نفسه ليس عليه filter بشكل دائم */
body {
    transition: filter 0.3s;
}
.modal-content-dark {
    background: #1a1a1a; 
    padding: 50px 40px; 
    border-radius: 30px; 
    text-align: center; 
    box-shadow: 0 30px 100px rgba(239, 68, 68, 0.2); 
    width: 85%; max-width: 420px;
    border: 2px solid #ef4444; 
    border-style: dashed;
}
.modal-content-dark .warning-icon {
    font-size: 6rem; color: #ef4444; margin-bottom: 25px;
    animation: pulse 1.5s infinite;
}
.modal-content-dark h2 { color: #ef4444; margin-bottom: 15px; font-size: 2rem; font-weight: 900; }
.modal-content-dark p { color: #f1f5f9; font-size: 1.1rem; margin-bottom: 30px; }
.modal-content-dark button {
    background: #ef4444; color: white; border: none; padding: 16px 30px; 
    border-radius: 15px; cursor: pointer; width: 100%; font-weight: 800; font-size: 1.2rem;
}
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}
    </style>
</head>
<body>

<div class="calc-container">
    <input type="text" id="display" disabled>
    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button onclick="appendToDisplay('/')" class="op">÷</button>
        <button onclick="appendToDisplay('*')" class="op">×</button>
        <button onclick="deleteLast()">⌫</button>
        
        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('9')">9</button>
        <button onclick="appendToDisplay('-')" class="op">-</button>
        
        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button>
        <button onclick="appendToDisplay('+')" class="op">+</button>
        
        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button>
        <button onclick="calculate()">=</button>
        
        <button onclick="appendToDisplay('0')" style="grid-column: span 2;">0</button>
        <button onclick="appendToDisplay('.')">.</button>
        
    </div>
    <a href="javascript:history.back()" class="back-link">العودة للوحة الإدارة</a>
</div>


    <div id="blockingModal">
    <div class="modal-content-dark">
        <div class="warning-icon">🚫</div>
        <h2>تنبيه أمني محظور!</h2>
        <p>تم اكتشاف محاولة وصول مباشر غير مصرح بها. المنطقة محمية ولا يمكن دخولها إلا عبر بوابة التحقق.</p>
        <button onclick="window.location.href='teacher-portal-77x-s5r30nh134.html'">العودة لبوابة التحقق</button>
    </div>
</div>

<script>
    let display = document.getElementById('display');
    function appendToDisplay(input) { display.value += input; }
    function clearDisplay() { display.value = ""; }
    function deleteLast() { display.value = display.value.slice(0, -1); }
    function calculate() {
        try { display.value = eval(display.value); }
        catch (error) { display.value = "خطأ"; }
    }
    window.onload = function() {
    const hasAccess = sessionStorage.getItem('adminAccess');
    
    if (hasAccess !== 'true') {
        // نوت: أظهر النافذة أولاً
        document.getElementById('blockingModal').style.display = 'flex';
        
        // نوت: بدلاً من تغبيش body، غبّش الحاوية التي تحتوي على الكروت والعناوين فقط
        // سنفترض أن محتوى صفحتك داخل "div" أو سنستهدف العناصر مباشرة
        const elementsToBlur = document.querySelectorAll('.back-nav, h1, .hub-container');
        elementsToBlur.forEach(el => {
            el.style.filter = "blur(10px)";
            el.style.pointerEvents = "none"; // منع الكبس على ما خلف النافذة
        });
    }
};
</script>
</body>
</html>
