<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العداد الذكي</title>
    <style>
        /* تصميم الخلفية والألوان */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* حاوية العداد */
        .counter-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
            width: 300px;
        }

        h2 { font-size: 1.5rem; margin-bottom: 10px; opacity: 0.9; }

        /* الرقم الكبير */
        .number {
            font-size: 110px;
            font-weight: 800;
            margin: 20px 0;
            text-shadow: 2px 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.1s ease;
        }

        /* زر الإضافة */
        .btn-add {
            background: linear-gradient(to right, #00d2ff 0%, #3a7bd5 100%);
            border: none;
            color: white;
            padding: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .btn-add:hover { transform: scale(1.03); filter: brightness(1.1); }
        .btn-add:active { transform: scale(0.95); }

        /* زر التصفير */
        .btn-reset {
            background: none;
            border: 1px solid rgba(255,255,255,0.3);
            color: rgba(255,255,255,0.7);
            margin-top: 25px;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .btn-reset:hover { background: #e74c3c; color: white; border-color: #e74c3c; }

        /* زر العودة */
        .back-link {
            display: block;
            margin-top: 30px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }
        .back-link:hover { color: white; }
    </style>
</head>
<body>

    <div class="counter-container">
        <h2>إحصائيات الإنجاز</h2>
        <div class="number" id="display">0</div>
        
        <button class="btn-add" onclick="increment()">إضافة +</button>
        
        <button class="btn-reset" onclick="resetCounter()">إعادة تصفير 0</button>
        
        <a href="index.html" class="back-link">⬅ العودة للقائمة الرئيسية</a>
    </div>

    <script>
        // نظام الحفظ التلقائي (LocalStorage)
        let savedValue = localStorage.getItem("myGlobalCount");
        let count = savedValue ? parseInt(savedValue) : 0;

        const displayElement = document.getElementById("display");
        displayElement.innerText = count;

        function increment() {
            count++;
            updateUI();
            playClickSound();
        }

        function resetCounter() {
            if(confirm("هل أنت متأكد من تصفير العداد؟")) {
                count = 0;
                updateUI();
            }
        }

        function updateUI() {
            displayElement.innerText = count;
            // تأثير حركي خفيف للرقم عند الزيادة
            displayElement.style.transform = "scale(1.1)";
            setTimeout(() => { displayElement.style.transform = "scale(1)"; }, 100);
            
            // الحفظ في ذاكرة المتصفح
            localStorage.setItem("myGlobalCount", count);
        }

        function playClickSound() {
            // رابط صوت "نقرة" من الإنترنت
            const audio = new Audio('https://www.soundjay.com/buttons/sounds/button-10.mp3');
            audio.play();
        }
    </script>
</body>
</html>
