<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة العداد الذكية 🔢</title>
    <style>
        body { 
            background: #0f172a; 
            color: white; 
            text-align: center; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            height: 100vh; 
        }
        
        .counter-container {
            background: #1e293b;
            padding: 40px;
            border-radius: 30px;
            display: inline-block;
            margin: 0 auto;
            border: 2px solid #334155;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        #number {
            font-size: 8rem;
            font-weight: bold;
            color: #38bdf8;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        .btns-row { display: flex; gap: 15px; justify-content: center; }

        button.control {
            padding: 15px 30px;
            font-size: 1.5rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }

        .inc { background: #10b981; color: white; }
        .dec { background: #f87171; color: white; }
        .reset { background: #64748b; color: white; font-size: 1rem; margin-top: 20px; }

        button:hover { transform: scale(1.05); opacity: 0.9; }
        button:active { transform: scale(0.95); }

        /* زر العودة الذكي */
        .back-nav {
            position: absolute;
            bottom: 40px;
            width: 100%;
        }

        .back-link {
            color: #94a3b8;
            text-decoration: none;
            font-size: 1rem;
            border-bottom: 1px solid transparent;
            transition: 0.3s;
        }

        .back-link:hover { color: #38bdf8; border-color: #38bdf8; }
    </style>
</head>
<body>

    <div class="counter-container">
        <h2 style="color: #94a3b8; margin-top: 0;">العداد الرقمي</h2>
        <div id="number">0</div>
        
        <div class="btns-row">
            <button class="control dec" onclick="change(-1)">-</button>
            <button class="control inc" onclick="change(1)">+</button>
        </div>
        
        <button class="reset" onclick="reset()">إعادة ضبط</button>
    </div>

    <div class="back-nav" id="backNav"></div>

    <script>
        let count = 0;
        const numDisplay = document.getElementById('number');

        function change(val) {
            count += val;
            numDisplay.innerText = count;
            // تأثير لوني بسيط عند التغيير
            numDisplay.style.color = count > 0 ? '#10b981' : (count < 0 ? '#f87171' : '#38bdf8');
        }

        function reset() {
            count = 0;
            numDisplay.innerText = count;
            numDisplay.style.color = '#38bdf8';
        }

        // --- التعديل الذكي لزر العودة ---
        const backNav = document.getElementById('backNav');
        const role = sessionStorage.getItem('userRole');

        if (role === 'teacher') {
            // إذا كان معلم يرجع لصفحة المعلم المعقدة
            backNav.innerHTML = `<a href="teacher-portal-77x-s5r30nh134.html" class="back-link">⬅ العودة للوحة الإدارة</a>`;
        } else {
            // إذا كان طالب يرجع لصفحة الطالب المعقدة
            backNav.innerHTML = `<a href="student-access-v99-k2p8z5.html" class="back-link">⬅ العودة لصفحة الطلاب</a>`;
        }
    </script>
</body>
</html>
