<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عرض دروس الطلاب - QR</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        body { background: #0f172a; color: white; text-align: center; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        h1 { color: #38bdf8; margin-bottom: 20px; }
        #qrGrid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
        .card { background: white; padding: 15px; border-radius: 12px; color: #000; width: 160px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .card p { margin-top: 10px; font-weight: bold; font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; }
        canvas { width: 130px; height: 130px; }
        .error-box { background: rgba(239, 68, 68, 0.1); color: #f87171; padding: 15px; border-radius: 10px; display: inline-block; border: 1px solid #ef4444; }
    </style>
</head>
<body>

    <h1>الدروس المتاحة للطلاب 📚</h1>
    <div id="qrGrid">جاري الاتصال بالسحاب... ⏳</div>

    <script>
        // إعدادات مشروعك في سويسرا
        const S_URL = 'https://dkvywsnztqyxcfliqldw.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrdnl3c256dHF5eGNmbGlwbGR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMzg5MTksImV4cCI6MjA4OTkxNDkxOX0.0A31WY3QrAl_o376rJSZ9t9aYyWRbyjSMShq6vAOOdk';
        
        const _supabase = supabase.createClient(S_URL, S_KEY, {
            auth: { persistSession: false }
        });

        async function fetchLessons() {
            try {
                const { data, error } = await _supabase
                    .from('lessons')
                    .select('*')
                    .order('id', { ascending: false });

                if (error) throw error;

                const grid = document.getElementById('qrGrid');
                grid.innerHTML = "";

                if (!data || data.length === 0) {
                    grid.innerHTML = "قاعدة البيانات فارغة. أضف درساً من لوحة الإدارة.";
                    return;
                }

                data.forEach(lesson => {
                    if (!lesson.url) return;

                    const card = document.createElement('div');
                    card.className = "card";
                    
                    const canvas = document.createElement('canvas');
                    const p = document.createElement('p');
                    p.innerText = lesson.name;

                    card.appendChild(canvas);
                    card.appendChild(p);
                    grid.appendChild(card);

                    // توليد الباركود باستخدام مكتبة QRious
                    new QRious({
                        element: canvas,
                        value: lesson.url,
                        size: 150
                    });
                });
            } catch (err) {
                console.error("Fetch Error:", err);
                document.getElementById('qrGrid').innerHTML = `
                    <div class="error-box">
                        <b>حدث خطأ في جلب البيانات:</b><br>
                        ${err.message}<br><br>
                        <button onclick="location.reload()" style="background:#ef4444; color:white; border:none; padding:5px 15px; border-radius:5px; cursor:pointer;">إعادة محاولة</button>
                    </div>`;
            }
        }

        // تشغيل الجلب
        fetchLessons();

        // تحديث البيانات تلقائياً كل 10 ثوانٍ (كحل بديل ومستقر)
        setInterval(fetchLessons, 10000);
    </script>
</body>
</html>
