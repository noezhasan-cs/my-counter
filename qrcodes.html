<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مكتبة الدروس</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/davidshimjs-qrcodejs@0.0.2/qrcode.min.js"></script>
    <style>
        body { background:#0f172a; color:white; text-align:center; font-family:sans-serif; padding:20px; }
        #qrGrid { display:flex; flex-wrap:wrap; justify-content:center; gap:20px; margin-top:20px; }
        .card { background:white; padding:15px; border-radius:15px; color:black; width:160px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <h1>الدروس المتاحة 📚</h1>
    <div id="qrGrid">جاري الاتصال بالسحاب...</div>
    <a href="index.html" style="color:#64748b; display:block; margin-top:40px; text-decoration:none;">⬅ العودة للرئيسية</a>

    <script>
        const SUPABASE_URL = 'https://fxefxyobcrbkfdtemej.supabase.co';
        const SUPABASE_KEY = 'ضغ_هنا_مفتاح_الـ_anon_الخاص_بك';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchLessons() {
            const { data, error } = await _supabase.from('lessons').select('*').order('id', { ascending: false });
            if (error) { console.error(error); return; }
            render(data);
        }

        function render(lessons) {
            const grid = document.getElementById('qrGrid');
            grid.innerHTML = "";
            lessons.forEach(item => {
                const container = document.createElement('div');
                container.className = "card";
                const qrId = `qr-${item.id}`;
                container.innerHTML = `<div id="${qrId}"></div><p style="font-weight:bold; margin-top:10px;">${item.name}</p>`;
                grid.appendChild(container);
                new QRCode(document.getElementById(qrId), { text: item.url, width: 130, height: 130 });
            });
        }

        // الاستماع للتغييرات اللحظية (Realtime)
        _supabase.channel('public:lessons')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'lessons' }, (payload) => {
                fetchLessons();
            }).subscribe();

        fetchLessons();
    </script>
</body>
</html>
