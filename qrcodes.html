<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مكتبة الباركودات الذكية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; text-align: center; padding: 30px; }
        .grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 30px; }
        .qr-card { background: white; padding: 15px; border-radius: 15px; color: #333; width: 180px; text-align: center; }
        .back { margin-top: 40px; display: inline-block; color: white; text-decoration: none; border: 1px solid white; padding: 10px 20px; border-radius: 50px; }
    </style>
</head>
<body>
    <h1>مكتبة باركوداتي الخاصة 📱</h1>
    <div id="qrGrid" class="grid">
        </div>
    <a href="index.html" class="back">⬅ العودة للرئيسية</a>

    <script>
        // قراءة الروابط من الذاكرة
        const links = JSON.parse(localStorage.getItem('myLinks')) || [];
        const grid = document.getElementById('qrGrid');

        if (links.length === 0) {
            grid.innerHTML = "<p>لا توجد روابط مضافة بعد. اذهب لصفحة الإدارة!</p>";
        }

        links.forEach((item, index) => {
            // إنشاء كرت لكل رابط
            const card = document.createElement('div');
            card.className = 'qr-card';
            card.innerHTML = `<p>${item.name}</p><div id="qr-${index}"></div>`;
            card.onclick = () => window.open(item.url, '_blank');
            grid.appendChild(card);

            // توليد الباركود داخل الكرت
            new QRCode(document.getElementById(`qr-${index}`), {
                text: item.url,
                width: 150,
                height: 150
            });
        });
    </script>
</body>
</html>
