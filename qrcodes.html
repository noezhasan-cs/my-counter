<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مكتبة الباركودات</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; text-align: center; padding: 40px; }
        .grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 30px; }
        .qr-card { background: white; padding: 20px; border-radius: 15px; color: #333; cursor: pointer; transition: 0.3s; width: 180px; }
        .qr-card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .back { margin-top: 40px; display: inline-block; color: white; text-decoration: none; border: 1px solid white; padding: 10px 20px; border-radius: 50px; }
    </style>
</head>
<body>
    <h1>مكتبة الروابط السريعة 🔗</h1>
    <div class="grid">
        <div class="qr-card" onclick="window.open('https://google.com', '_blank')">
            <p>بحث جوجل</p>
            <div id="q1"></div>
        </div>
        <div class="qr-card" onclick="window.open('https://youtube.com', '_blank')">
            <p>يوتيوب</p>
            <div id="q2"></div>
        </div>
    </div>
    <a href="index.html" class="back">⬅ العودة للرئيسية</a>

    <script>
        new QRCode(document.getElementById("q1"), { text: "https://google.com", width: 150, height: 150 });
        new QRCode(document.getElementById("q2"), { text: "https://youtube.com", width: 150, height: 150 });
    </script>
</body>
</html>
