<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عرض دروس الطلاب - QR</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/davidshimjs-qrcodejs@0.0.2/qrcode.min.js"></script>
    <style>
        body { background: #0f172a; color: white; text-align: center; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        h1 { color: #38bdf8; margin-bottom: 30px; }
        #qrGrid { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 25px; 
            margin-top: 20px; 
        }
        .card { 
            background: white; 
            padding: 15px; 
            border-radius: 15px; 
            color: #0f172a; 
            width: 160px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            transition: 0.3s;
            animation: fadeIn 0.6s ease-out;
        }
        .card:hover { transform: translateY(-5px); }
        .card p { margin-top: 10px; font-weight: bold; font-size: 0.9rem; word-wrap: break-word; }
        .back-link { display: block; margin-top: 50px; color: #64748b; text-decoration: none; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <h1>الدروس المتاحة للطلاب 📚</h1>
    
    <div id="qrGrid">جاري تحميل الدروس من السحاب... ⏳</div>

    <a href="index.html" class="back-link">⬅ العودة للرئيسية</a>

    <script>
        // إعدادات الربط مع مشروعك في سويسرا
        const S_URL = 'https://dkvywsnztqyxcfliqldw.supabase.co'.trim();
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrdnl3c256dHF5eGNmbGlwbGR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMzg5MTksImV4cCI6MjA4OTkxNDkxOX0.0A31WY3QrAl_o376rJSZ9t9aYyWRbyjSMShq6vAOOdk'.trim();
        
        const _supabase = supabase.createClient(S_URL, S_KEY);

        // دالة جلب البيانات ورسم الباركود
        async function fetchLessons() {
            const { data, error } = await _supabase
                .from('lessons')
                .select('*')
                .order('id', { ascending: false }); // عرض الأحدث أولاً

            const grid = document.getElementById('qrGrid');
            
            if (error) {
                grid.innerHTML = "خطأ في تحميل البيانات: " + error.message;
                return;
            }

            grid.innerHTML = ""; // مسح المحتوى القديم

            if (data.length === 0) {
                grid.innerHTML = "لا توجد دروس مرفوعة حالياً.";
                return;
            }

            data.forEach(lesson => {
                // إنشاء الكرت الخاص بكل درس
                const card = document.createElement('div');
                card.className = "card";
                
                // مكان وضع الباركود
                const qrContainer = document.createElement('div');
                qrContainer.id = "qr-" + lesson.id;
                
                const title = document.createElement('p');
                title.innerText = lesson.name;

                card.appendChild(qrContainer);
                card.appendChild(title);
                grid.appendChild(card);

                // توليد الباركود داخل الحاوية
                new QRCode(qrContainer, {
                    text: lesson.url,
                    width: 130,
                    height: 130,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            });
        }

        // تشغيل الجلب عند فتح الصفحة
        fetchLessons();

        // تفعيل التحديث التلقائي (Realtime)
        // عند حدوث أي تغيير في جدول lessons، سيتم تحديث الصفحة فوراً
        _supabase
            .channel('public:lessons')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'lessons' }, (payload) => {
                console.log('تغيير جديد!', payload);
                fetchLessons();
            })
            .subscribe();

    </script>
</body>
</html>
