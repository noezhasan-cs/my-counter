<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة الدروس المحدثة 📖</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { background: var(--bg); color: #1e293b; font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; padding: 20px; }
        .filters { display: flex; gap: 10px; justify-content: center; margin-bottom: 25px; flex-wrap: wrap; }
        select { padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; background: white; min-width: 150px; }
        #qrGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .card { 
            background: white; padding: 15px; border-radius: 15px; 
            color: #1e293b; text-decoration: none; transition: 0.3s; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.03); border: 1px solid transparent; 
            cursor: pointer; position: relative; display: block;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
        .card p { margin: 10px 0 0; font-weight: bold; font-size: 0.9rem; }
        .subj-tag { font-size: 0.7rem; color: var(--primary); background: #eff6ff; padding: 3px 8px; border-radius: 10px; position: absolute; top: 10px; right: 10px; }
        canvas { width: 140px; height: 140px; margin: 15px auto 0; display: block; border-radius: 10px; }
        .loading { grid-column: 1 / -1; margin-top: 50px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <h1 style="color: var(--primary);">دروسي التفاعلية 🎓</h1>
    
    <div class="filters">
        <select id="studentClass" onchange="fetchLessons()">
            <option value="all">كل الصفوف</option>
            <option value="السابع">السابع</option><option value="الثامن">الثامن</option>
            <option value="التاسع">التاسع</option><option value="العاشر">العاشر</option>
        </select>
        
        <select id="studentSubject" onchange="fetchLessons()">
            <option value="all">كل المواد</option>
            <option value="الرياضيات">الرياضيات</option><option value="الفيزياء">الفيزياء</option>
            <option value="اللغة العربية">الغة العربية</option><option value="الإنجليزية">الإنجليزية</option>
        </select>
    </div>

    <div id="qrGrid"><div class="loading">جاري جلب الدروس... ⏳</div></div>

    <script>
        const S_URL = 'https://dkvywsnztqyxcflipldw.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrdnl3c256dHF5eGNmbGlwbGR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMzg5MTksImV4cCI6MjA4OTkxNDkxOX0.0A31WY3QrAl_o376rJSZ9t9aYyWRbyjSMShq6vAOOdk'; 
        const _supabase = supabase.createClient(S_URL, S_KEY);

        async function fetchLessons() {
            const classVal = document.getElementById('studentClass').value;
            const subjectVal = document.getElementById('studentSubject').value;
            const grid = document.getElementById('qrGrid');
            
            // تصحيح: استخدمنا علامات تنصيص عادية هنا
            grid.innerHTML = '<div class="loading">جاري البحث... ⏳</div>';

            try {
                let query = _supabase.from('lessons').select('*').order('id', { ascending: false });
                if (classVal !== 'all') query = query.eq('class_name', classVal);
                if (subjectVal !== 'all') query = query.eq('subject_name', subjectVal);

                const { data, error } = await query;
                if (error) throw error;

                grid.innerHTML = "";
                if (!data || data.length === 0) { 
                    grid.innerHTML = '<p style="color: #64748b; margin-top:30px;">لا توجد دروس حالياً لهذا الاختيار.</p>'; 
                    return; 
                }

                data.forEach(lesson => {
                    let finalUrl = "";

                    // تحديد الرابط: إذا كان مرفوع (file) أو نص (text) يذهب لصفحتك
                    if (lesson.content_type === 'file' || lesson.content_type === 'text') {
                        // تأكد أن الرابط ينتهي باسم الصفحة الصحيح لديك
                        finalUrl = `https://noezhasan-cs.github.io/my-counter/view-lesson.html?id=${lesson.id}`;
                    } else {
                        // إذا كان رابط يوتيوب قديم
                        finalUrl = lesson.url;
                    }

                    if (!finalUrl) return;

                    const card = document.createElement('div');
                    card.className = "card";
                    card.onclick = () => window.open(finalUrl, '_blank');
                    
                    card.innerHTML = `
                        <span class="subj-tag">${lesson.subject_name}</span>
                        <canvas id="qr-${lesson.id}"></canvas>
                        <p>${lesson.name}</p>
                    `;
                    grid.appendChild(card);

                    // توليد الباركود على الكانفاس المحدد
                    new QRious({ 
                        element: document.getElementById(`qr-${lesson.id}`), 
                        value: finalUrl, 
                        size: 250 
                    });
                });
            } catch (err) { console.error(err); }
        }

        fetchLessons();
    </script>
</body>
</html>
