<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة الدروس الذكية | للطلاب</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; text-align: center; padding: 20px; margin: 0; }
        h1 { color: var(--primary); margin-bottom: 30px; font-size: 1.8rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 25px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        
        .qr-card { 
            background: white; padding: 20px; border-radius: 20px; color: #333; 
            transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; 
            align-items: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .qr-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(56, 189, 248, 0.4); }
        .qr-card p { margin-top: 15px; font-weight: bold; color: #0f172a; font-size: 1rem; }
        .qr-container { background: white; padding: 5px; border-radius: 10px; }
        
        .empty-msg { grid-column: 1 / -1; color: #94a3b8; font-style: italic; margin-top: 50px; }
        .back-home { margin-top: 50px; display: inline-block; color: #94a3b8; text-decoration: none; padding: 10px 25px; border: 1px solid #334155; border-radius: 50px; transition: 0.3s; }
        .back-home:hover { background: #1e293b; color: white; }
    </style>
</head>
<body>

    <h1>مكتبة الدروس المرفوعة 📚</h1>
    <div id="qrGrid" class="grid">جاري الاتصال بالسحاب... 🛰️</div>
    
    <a href="index.html" class="back-home">⬅ العودة للرئيسية</a>

    <script>
        // 1. إعدادات الربط (نفس الرابط المستخدم في الإدارة)
        const firebaseConfig = {
            databaseURL: "https://myschoolproject-fdf5c-default-rtdb.europe-west1.firebasedatabase.app/"
        };

        // 2. تشغيل Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // 3. قراءة البيانات لحظياً من مجلد lessons
        db.ref('lessons').on('value', (snapshot) => {
            const data = snapshot.val();
            const grid = document.getElementById('qrGrid');
            grid.innerHTML = ""; // تنظيف الشاشة قبل عرض الدروس

            if (!data) {
                grid.innerHTML = "<p class='empty-msg'>لا توجد دروس مرفوعة حالياً. المعلم سيضيفها قريباً!</p>";
                return;
            }

            // تحويل البيانات لباركودات
            for (let id in data) {
                const item = data[id];
                const card = document.createElement('div');
                card.className = 'qr-card';
                card.onclick = () => window.open(item.url, '_blank');
                
                card.innerHTML = `
                    <div class="qr-container" id="qr-${id}"></div>
                    <p>${item.name}</p>
                `;
                grid.appendChild(card);

                // إنشاء الباركود داخل الكارت
                new QRCode(document.getElementById(`qr-${id}`), {
                    text: item.url,
                    width: 150,
                    height: 150,
                    colorDark : "#0f172a",
                    colorLight : "#ffffff"
                });
            }
        }, (error) => {
            console.error("خطأ في القراءة:", error);
            document.getElementById('qrGrid').innerHTML = "<p>تعذر تحميل الدروس. تأكد من اتصال الإنترنت.</p>";
        });
    </script>
</body>
</html>
