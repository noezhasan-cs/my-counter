<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دروسي التفاعلية 📱</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .header-info { margin-bottom: 25px; padding: 15px; background: #1e293b; border-radius: 15px; display: inline-block; min-width: 300px; }
        h2 { color: #38bdf8; margin: 0; }
        
        .filter-box { margin-bottom: 30px; }
        select { padding: 12px; border-radius: 12px; background: #0f172a; color: white; border: 1px solid #38bdf8; width: 250px; font-size: 1rem; }

        #qrGrid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 15px; color: #0f172a; width: 160px; text-decoration: none; transition: 0.3s; }
        .card:hover { transform: scale(1.05); }
        .card p { margin: 10px 0 0; font-weight: bold; font-size: 0.85rem; }
        canvas { width: 130px; height: 130px; margin: 0 auto; display: block; }

        .btn-change { display: block; margin-top: 30px; color: #94a3b8; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="header-info">
        <p style="margin:0; font-size: 0.8rem; color: #94a3b8;">أنت تتصفح دروس:</p>
        <h2 id="displayClassName">جاري التحميل...</h2>
    </div>

    <div class="filter-box">
        <label style="display:block; margin-bottom:10px;">اختر المادة:</label>
        <select id="subjectSelect" onchange="fetchLessons()">
            <option value="all">كل المواد المتاحة</option>
            </select>
    </div>

    <div id="qrGrid"></div>

    <a href="select-class.html" class="btn-change">🔄 تغيير الصف الدراسي</a>

    <script>
        const S_URL = 'https://dkvywsnztqyxcflipldw.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrdnl3c256dHF5eGNmbGlwbGR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMzg5MTksImV4cCI6MjA4OTkxNDkxOX0.0A31WY3QrAl_o376rJSZ9t9aYyWRbyjSMShq6vAOOdk';
        const _supabase = supabase.createClient(S_URL, S_KEY);

        const selectedClass = localStorage.getItem('selectedClass');
        if (!selectedClass) window.location.href = 'select-class.html';

        document.getElementById('displayClassName').innerText = `الصف ${selectedClass}`;

        async function updateSubjectsList() {
            // جلب المواد الفريدة الموجودة في قاعدة البيانات لهذا الصف فقط
            const { data } = await _supabase.from('lessons').select('subject_name').eq('class_name', selectedClass);
            const subjects = [...new Set(data.map(item => item.subject_name))];
            
            const select = document.getElementById('subjectSelect');
            subjects.forEach(sub => {
                const opt = document.createElement('option');
                opt.value = sub;
                opt.innerText = sub;
                select.appendChild(opt);
            });
        }

        async function fetchLessons() {
            const subject = document.getElementById('subjectSelect').value;
            const grid = document.getElementById('qrGrid');
            grid.innerHTML = "جاري التحميل... ⏳";

            let query = _supabase.from('lessons').select('*').eq('class_name', selectedClass);
            if (subject !== 'all') query = query.eq('subject_name', subject);

            const { data, error } = await query;
            grid.innerHTML = "";

            if (data.length === 0) {
                grid.innerHTML = "<p>لا توجد دروس مرفوعة لهذه المادة حالياً.</p>";
                return;
            }

            data.forEach(lesson => {
                const card = document.createElement('a');
                card.className = "card";
                card.href = lesson.url; card.target = "_blank";
                
                const canvas = document.createElement('canvas');
                const p = document.createElement('p');
                p.innerText = lesson.name;

                card.appendChild(canvas);
                card.appendChild(p);
                grid.appendChild(card);

                new QRious({ element: canvas, value: lesson.url, size: 200 });
            });
        }

        updateSubjectsList();
        fetchLessons();
    </script>
</body>
</html>
