<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عرض دروس الطلاب - QR</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/davidshimjs-qrcodejs@0.0.2/qrcode.min.js"></script>
    <style>
        body { background: #0f172a; color: white; text-align: center; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        h1 { color: #38bdf8; }
        #qrGrid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
        .card { background: white; padding: 15px; border-radius: 12px; color: #000; width: 150px; }
        .card p { margin-top: 10px; font-weight: bold; font-size: 0.8rem; }
        .error-msg { color: #f87171; background: rgba(248, 113, 113, 0.1); padding: 10px; border-radius: 8px; display: inline-block; }
    </style>
</head>
<body>

    <h1>الدروس المتاحة للطلاب 📚</h1>
    <div id="qrGrid">جاري الاتصال بالسحاب... ⏳</div>

    <script>
        const S_URL = 'https://dkvywsnztqyxcfliqldw.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrdnl3c256dHF5eGNmbGlwbGR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMzg5MTksImV4cCI6MjA4OTkxNDkxOX0.0A31WY3QrAl_o376rJSZ9t9aYyWRbyjSMShq6vAOOdk';
        
        // إعداد العميل مع تعطيل التخزين المؤقت لضمان عدم حدوث Fetch Error
        const _supabase = supabase.createClient(S_URL, S_KEY, {
            auth: { persistSession: false }
        });

        async function fetchLessons() {
            try {
                const { data, error } = await _supabase
                    .from('lessons')
                    .select('id, name, url')
                    .order('id', { ascending: false });

                if (error) throw error;

                const grid = document.getElementById('qrGrid');
                grid.innerHTML = "";

                if (data.length === 0) {
                    grid.innerHTML = "قاعدة البيانات فارغة حالياً.";
                    return;
                }

                data.forEach(lesson => {
                    if(!lesson.url) return;
                    
                    const card = document.createElement('div');
                    card.className = "card";
                    const qrDiv = document.createElement('div');
                    qrDiv.id = "qr-" + lesson.id;
                    const p = document.createElement('p');
                    p.innerText = lesson.name;

                    card.appendChild(qrDiv);
                    card.appendChild(p);
                    grid.appendChild(card);

                    new QRCode(qrDiv, { text: lesson.url, width: 120, height: 120 });
                });
            } catch (err) {
                console.error(err);
                document.getElementById('qrGrid').innerHTML = `<div class="error-msg">فشل الاتصال: تأكد من تشغيل الإنترنت أو تحديث الصفحة</div>`;
            }
        }

        fetchLessons();
        // تحديث كل 10 ثواني كبديل مؤقت للـ Realtime لضمان العمل
        setInterval(fetchLessons, 10000);
    </script>
</body>
</html>
