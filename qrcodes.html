<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مكتبة الدروس الذكية</title>
    <script src="https://cdn.jsdelivr.net/npm/davidshimjs-qrcodejs@0.0.2/qrcode.min.js"></script>
    <style>
        body { background:#0f172a; color:white; text-align:center; font-family:sans-serif; margin:0; padding:20px; }
        #qrGrid { display:flex; flex-wrap:wrap; justify-content:center; gap:20px; padding:20px; }
        .card { background:white; padding:15px; border-radius:15px; color:black; width:160px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .back-btn { display:inline-block; margin-top:30px; color:#94a3b8; text-decoration:none; border:1px solid #334155; padding:10px 20px; border-radius:50px; }
    </style>
</head>
<body>
    <h1>دروس الطلاب المرفوعة 📚</h1>
    <div id="qrGrid">جاري فحص الذاكرة... ⚡</div>
    <a href="index.html" class="back-btn">⬅ العودة للرئيسية</a>

    <script>
        const dbUrl = "https://myschoolproject-fdf5c-default-rtdb.europe-west1.firebasedatabase.app/lessons.json";
        const grid = document.getElementById('qrGrid');

        // دالة رسم الباركودات من البيانات
        function renderData(data) {
            grid.innerHTML = "";
            if (!data) {
                grid.innerHTML = "لا توجد دروس حالياً.";
                return;
            }
            for (let id in data) {
                let container = document.createElement('div');
                container.className = "card";
                container.innerHTML = `<div id="qr-${id}"></div><p style="margin-top:10px; font-weight:bold;">${data[id].name}</p>`;
                grid.appendChild(container);
                new QRCode(document.getElementById(`qr-${id}`), { text: data[id].url, width: 130, height: 130 });
            }
        }

        async function loadData() {
            // 1. فحص إذا كانت البيانات موجودة في الذاكرة المحلية (Cache)
            const cachedData = localStorage.getItem('lessons_cache');
            
            // إذا كان المستخدم ضغط Refresh (أو البيانات غير موجودة)، نجلبها من السحاب
            const isRefresh = (performance.navigation.type === 1); 

            if (cachedData && !isRefresh) {
                console.log("تم جلب البيانات من الذاكرة المحلية");
                renderData(JSON.parse(cachedData));
            } else {
                console.log("جاري جلب بيانات جديدة من السحاب...");
                try {
                    const response = await fetch(dbUrl);
                    const data = await response.json();
                    // حفظ في الذاكرة المحلية للمرة القادمة
                    localStorage.setItem('lessons_cache', JSON.stringify(data));
                    renderData(data);
                } catch (error) {
                    grid.innerHTML = "حدث خطأ في الاتصال.";
                }
            }
        }

        loadData();
    </script>
</body>
</html>
