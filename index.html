<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصتي الذكية - القائمة الرئيسية</title>
    <style>
        /* تنسيق الخلفية والألوان */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e; /* لون ليلي هادئ */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        /* حاوية القائمة */
        .main-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 50px 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            width: 320px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #00d2ff;
        }

        p {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 30px;
        }

        /* تنسيق الأزرار المشترك */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            text-decoration: none;
            color: white;
            font-weight: bold;
            border-radius: 15px;
            transition: 0.3s;
            font-size: 1.1rem;
        }

        /* لون زر العداد */
        .btn-counter {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        /* لون زر الباركودات */
        .btn-qr {
            background: linear-gradient(135deg, #2193b0, #6dd5ed);
        }

        /* لون زر الإدارة (اللون البنفسجي) */
        .btn-admin {
            background: linear-gradient(135deg, #8e44ad, #c39bd3);
        }

        /* تأثيرات الحركة عند تمرير الماوس */
        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: translateY(0);
        }

        .footer-note {
            margin-top: 20px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>أهلاً بك يا حسن 🚀</h1>
        <p>اختر الأداة التي تريد استخدامها:</p>

        <a href="counter.html" class="btn btn-counter">
            <span>🔢</span> العداد الذكي
        </a>

        <a href="qrcodes.html" class="btn btn-qr">
            <span>🔗</span> مكتبة الباركودات
        </a>

        <a href="admin.html" class="btn btn-admin">
            <span>⚙️</span> لوحة الإدارة
        </a>

        <div class="footer-note">تم التطوير بواسطة حسن - 2026</div>
    </div>

</body>
</html>
