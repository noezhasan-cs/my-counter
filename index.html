<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة إدارة الدروس</title>
    <style>
        body { 
            background: #0f172a; 
            color: white; 
            text-align: center; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            height: 100vh; 
        }
        h1 { color: #38bdf8; font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #94a3b8; margin-bottom: 40px; }
        
        .container { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 25px; 
            padding: 20px;
        }

        .nav-card {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 20px;
            padding: 30px;
            width: 250px;
            text-decoration: none;
            color: white;
            transition: 0.3s all ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .nav-card:hover {
            border-color: #38bdf8;
            transform: translateY(-10px);
            background: #1e293b;
            box-shadow: 0 15px 35px rgba(56, 189, 248, 0.2);
        }

        .icon { font-size: 3rem; margin-bottom: 15px; display: block; }
        .title { font-size: 1.4rem; font-weight: bold; color: #38bdf8; }
        .desc { font-size: 0.9rem; color: #94a3b8; margin-top: 10px; display: block; }

        footer { position: absolute; bottom: 20px; width: 100%; color: #475569; font-size: 0.8rem; }
    </style>
</head>
<body>

    <h1>مرحباً بك في المنصة التعليمية 🎓</h1>
    <p>اختر الوجهة التي تريد الذهاب إليها</p>

    <div class="container">
        <a href="admin.html" class="nav-card">
            <span class="icon">⚙️</span>
            <span class="title">لوحة الإدارة</span>
            <span class="desc">لإضافة دروس جديدة وحذف الدروس القديمة.</span>
        </a>

        <a href="qrcodes.html" class="nav-card">
            <span class="icon">📱</span>
            <span class="title">عرض الباركودات</span>
            <span class="desc">لمشاهدة الدروس المتاحة للطلاب عبر الـ QR.</span>
        </a>
    </div>

    <footer>تم التطوير بواسطة حسن &copy; 2026</footer>

</body>
</html>
