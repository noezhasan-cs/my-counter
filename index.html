<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة حسن التعليمية</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .card { background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); width: 340px; }
        .btn { display: block; padding: 15px; margin: 15px 0; text-decoration: none; color: white; font-weight: bold; border-radius: 15px; transition: 0.3s; font-size: 1.1rem; border: none; cursor: pointer; width: 100%; font-family: inherit; }
        .btn-blue { background: #2193b0; }
        .btn-purple { background: #667eea; }
        .btn-dark { background: #34495e; margin-top: 30px; font-size: 0.9rem; opacity: 0.8; }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.2); }
    </style>
</head>
<body>
    <div class="card">
        <h1>أهلاً بك يا حسن 🚀</h1>
        <a href="qrcodes.html" class="btn btn-blue">📚 دروس الطلاب</a>
        <a href="counter.html" class="btn btn-purple">🔢 العداد الشخصي</a>
        <button onclick="askPass()" class="btn btn-dark">⚙️ لوحة المعلم</button>
    </div>

    <script>
        function askPass() {
            const pass = prompt("أدخل كلمة المرور السرية:");
            if (pass === "1234") {
                window.location.href = "admin.html";
            } else {
                alert("كلمة المرور غلط!");
            }
        }
    </script>
</body>
</html>
