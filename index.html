<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستقبل هاتفك | شاركنا فكرتك</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --primary: #7c3aed;
            --accent: #00d2ff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background: #0f172a;
            background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cairo', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* حاوية التصميم الزجاجي */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .glass-card h1 {
            font-size: 24px;
            margin-bottom: 10px;
            background: linear-gradient(to left, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-card p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            color: white;
            font-size: 16px;
            resize: none;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.3);
        }

        button:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 30px rgba(0, 210, 255, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* نظام التنبيهات */
        #notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 14px;
            display: none;
            z-index: 999;
        }

        /* خلفية تفاعلية خفيفة */
        .circle {
            position: absolute;
            width: 150px;
            height: 150px;
            background: var(--primary);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<div class="circle" style="top: 10%; right: 10%;"></div>
<div class="circle" style="bottom: 10%; left: 10%;"></div>

<div class="glass-card animate__animated animate__zoomIn">
    <h1>فكرتك تصنع التغيير 🚀</h1>
    <p>شو التطبيق اللي نفسك يكون بموبايلك؟</p>
    
    <textarea id="userComment" placeholder="اكتب فكرتك هنا..."></textarea>
    
    <button onclick="sendData()" id="sendBtn">إرسال الآن</button>
</div>

<div id="notification"></div>

<script>
    const startTime = Date.now();
    const S_URL = 'https://dkvywsnztqyxcflipldw.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrdnl3c256dHF5eGNmbGlwbGR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMzg5MTksImV4cCI6MjA4OTkxNDkxOX0.0A31WY3QrAl_o376rJSZ9t9aYyWRbyjSMShq6vAOOdk';
    
    const supabaseClient = supabase.createClient(S_URL, S_KEY);

    function notify(text, error = false) {
        const n = document.getElementById('notification');
        n.innerText = text;
        n.style.display = 'block';
        n.style.background = error ? '#ef4444' : '#10b981';
        n.className = 'animate__animated animate__fadeInUp';
        
        setTimeout(() => {
            n.className = 'animate__animated animate__fadeOutDown';
            setTimeout(() => n.style.display = 'none', 500);
        }, 3000);
    }

    async function sendData() {
        const btn = document.getElementById('sendBtn');
        const input = document.getElementById('userComment');
        const comment = input.value.trim();

        if (!comment) {
            notify("يا ريت تكتب شي أولاً! 😅", true);
            return;
        }

        btn.disabled = true;
        btn.innerText = "جاري الحفظ...";

        try {
            const { error } = await supabaseClient
                .from('user_feedback')
                .insert([{ 
                    comment: comment, 
                    time_spent: Math.floor((Date.now() - startTime) / 1000),
                    device_info: navigator.userAgent
                }]);

            if (error) throw error;

            notify("تم الإرسال بنجاح! شكراً لك ❤️");
            input.value = "";
        } catch (err) {
            console.error(err);
            notify("خطأ في سوبابيز: تأكد من الـ RLS!", true);
        } finally {
            btn.disabled = false;
            btn.innerText = "إرسال الآن";
        }
    }
      // 🛡️ درع الحماية - يمنع النسخ والفحص والقائمة اليمنى
    
    // 1. منع الزر الأيمن
    document.addEventListener('contextmenu', e => e.preventDefault());

    // 2. منع اختصارات لوحة المفاتيح
    document.onkeydown = function(e) {
        if (e.keyCode == 123 || // F12
            (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || // Inspect & Console
            (e.ctrlKey && e.keyCode == 85) || // View Source
            (e.ctrlKey && e.keyCode == 67)) { // Copy
            return false;
        }
    };

    // 3. منع تظليل النصوص (كأن الكليك يسار معطل للتحديد)
    document.addEventListener('selectstart', e => e.preventDefault());
</script>

</body>
</html>
