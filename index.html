<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة حسن التعليمية | الرئيسية</title>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .main-card { background: var(--card); padding: 40px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); width: 350px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        h1 { color: var(--primary); font-size: 1.8rem; margin-bottom: 10px; }
        p { color: #94a3b8; margin-bottom: 30px; }
        .btn { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 15px; margin: 15px 0; text-decoration: none; color: white; font-weight: bold; border-radius: 15px; transition: 0.3s; font-size: 1.1rem; border: none; cursor: pointer; width: 100%; font-family: inherit; }
        .btn-student { background: linear-gradient(135deg, #0284c7, #0ea5e9); }
        .btn-counter { background: linear-gradient(135deg, #4f46e5, #7c3aed); }
        .btn-admin { background: transparent; border: 1px solid #334155; color: #94a3b8; font-size: 0.9rem; margin-top: 20px; }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="main-card">
        <h1>منصة حسن الذكية 🚀</h1>
        <p>نظام إدارة المحتوى التعليمي السحابي</p>
        
        <a href="qrcodes.html" class="btn btn-student"><span>📚</span> دروس الطلاب</a>
        <a href="counter.html" class="btn btn-counter"><span>🔢</span> العداد الشخصي</a>
        
        <button onclick="checkAdmin()" class="btn btn-admin">⚙️ لوحة المعلم</button>
    </div>

    <script>
        function checkAdmin() {
            const pass = prompt("أدخل كلمة المرور السرية:");
            if (pass === "1234") {
                window.location.href = "admin.html";
            } else if (pass !== null) {
                alert("عذراً، كلمة المرور غير صحيحة.");
            }
        }
    </script>
</body>
</html>
